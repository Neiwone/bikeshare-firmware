CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Shell via UART
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y

# zbus
CONFIG_ZBUS=y

# Settings. native_sim keeps a runtime backend; nRF9160 overrides this with NVS.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
