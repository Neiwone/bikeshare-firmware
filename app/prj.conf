CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Shell via UART
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y

# zbus
CONFIG_ZBUS=y

# Settings (backend em RAM; para persistência real use CONFIG_SETTINGS_NVS ou CONFIG_SETTINGS_ZMS)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

# Rede — native_sim usa TAP (zeth); para hardware real troque CONFIG_ETH_NATIVE_TAP
# pelo driver da placa e ajuste os endereços IP conforme necessário.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NATIVE_TAP=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# IP estático do firmware (host fica em 192.0.2.2 conforme setup do zeth)
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.2"
