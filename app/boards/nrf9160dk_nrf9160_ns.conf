# nRF9160 DK hardware scaffold.
#
# This upstream-Zephyr manifest can build the board skeleton and persistent
# settings path. LTE modem, GNSS, and Nordic modem library options belong in
# the later NCS manifest/config because those symbols are not provided by
# upstream Zephyr.

# Hardware shell/log console.
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Board peripherals used by the planned LED and button modules.
CONFIG_GPIO=y

# Persistent Settings backend for hardware configuration.
CONFIG_SETTINGS_RUNTIME=n
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Generic network/MQTT libraries for the future hardware transport modules.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_MQTT_LIB=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
